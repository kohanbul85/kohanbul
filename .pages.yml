media:
  input: public/assets
  output: /assets

content:
  - name: director
    label: Director
    type: file
    path: src/content/director/profile.md
    fields:
      - { name: name_ko, label: 이름, type: string, required: true }
      - { name: name_en, label: 영문 표기, type: string }
      - { name: birth_year_display, label: 출생/연도 표기, type: string }
      - { name: primary_role, label: 대표 분야, type: string }
      - { name: profile_image, label: 프로필 사진, type: image }
      - { name: body, label: 국문 소개문, type: rich-text }
      - { name: bio_en, label: 영문 소개문, type: string }
      - name: education
        label: 학력
        type: object
        list: true
        fields:
          - { name: school, label: 학교명, type: string }
          - { name: department, label: 학과/전공, type: string }
          - { name: degree, label: 학위/상태, type: string }
      - { name: email, label: 이메일, type: string }
      - name: sns
        label: SNS
        type: object
        fields:
          - { name: instagram, label: Instagram, type: string }
          - { name: vimeo, label: Vimeo, type: string }
          - { name: youtube, label: YouTube, type: string }

  - name: works
    label: Works
    type: collection
    path: src/content/works
    filename: "{fields.slug}.md"
    fields:
      - { name: title_ko, label: 국문 제목, type: string, required: true }
      - { name: title_en, label: 영문 제목, type: string }
      - { name: slug, label: URL Slug, type: string, required: true }
      - { name: year, label: 연도, type: number, required: true }
      - { name: type, label: 유형, type: string }
      - { name: country, label: 국가, type: string }
      - { name: runtime_min, label: 상영시간_분, type: number }
      - { name: thumbnail, label: 대표 이미지, type: image }
      - { name: gallery, label: 갤러리, type: image, list: true }
      - { name: is_featured, label: 홈 노출, type: boolean }
      - { name: order, label: 정렬 순서, type: number }
      - { name: draft, label: 비공개, type: boolean }
      - name: cast
        label: 출연
        type: string
        list: true
      - name: genre_tags
        label: 장르 태그
        type: string
        list: true
      - name: credits
        label: 크레디트
        type: object
        list: true
        fields:
          - { name: role, label: 역할, type: string }
          - name: names
            label: 이름
            type: string
            list: true
      - name: awards
        label: 수상/상영
        type: object
        list: true
        fields:
          - { name: year, label: 연도, type: number }
          - { name: festival, label: 영화제, type: string }
          - { name: award, label: 수상내역, type: string }
          - name: type
            label: 유형
            type: select
            options:
              values:
                - award
                - screening
      - { name: trailer_youtube_id, label: 예고편 YouTube ID, type: string }
      - { name: body, label: Synopsis, type: rich-text }

  - name: notes
    label: 작업노트
    type: collection
    path: src/content/notes
    filename: "{fields.date}-{fields.title}.md"
    fields:
      - { name: title, label: 제목, type: string, required: true }
      - { name: date, label: 날짜, type: date, required: true }
      - { name: excerpt, label: 요약, type: string }
      - { name: body, label: 본문, type: rich-text }

  - name: criticism
    label: 비평
    type: collection
    path: src/content/criticism
    filename: "{fields.date}-{fields.title}.md"
    fields:
      - { name: title, label: 제목, type: string, required: true }
      - { name: author, label: 필자, type: string, required: true }
      - { name: source, label: 출처, type: string }
      - { name: date, label: 날짜, type: date, required: true }
      - { name: film, label: 관련 작품, type: string }
      - { name: excerpt, label: 요약, type: string }
      - { name: body, label: 본문, type: rich-text }

  - name: filmography
    label: Filmography
    type: collection
    path: src/content/filmography
    filename: "{fields.year}-{fields.title_ko}.md"
    fields:
      - { name: year, label: 연도, type: number, required: true }
      - { name: title_ko, label: 국문 제목, type: string, required: true }
      - { name: title_en, label: 영문 제목, type: string }
      - name: roles
        label: 역할
        type: string
        list: true
      - { name: role_detail, label: 역할 상세, type: string }
      - { name: type, label: 유형, type: string }
      - { name: work_slug, label: 작품 페이지 Slug, type: string }
      - { name: order, label: 정렬 순서, type: number }
